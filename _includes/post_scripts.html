<!-- Medium Zoom Script for Image Lightbox -->
<script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.0.8/dist/medium-zoom.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Initialize medium-zoom on all images within post-content
    const images = Array.from(document.querySelectorAll('.post-content img'));
    const zoom = mediumZoom(images, {
      margin: 24,
      background: 'rgba(0, 0, 0, 0.9)',
      scrollOffset: 0,
    });
  });
</script>

<!-- Copy Code Button Script -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Find all pre elements
    var blocks = document.querySelectorAll('pre.highlight');
    
    blocks.forEach(function(block) {
      // Create a button
      var button = document.createElement('button');
      button.className = 'copy-code-btn';
      button.innerText = 'Copy';
      
      // Add the button to the parent figure (or wrapper)
      var wrapper = block.parentElement;
      // Make sure the wrapper is relatively positioned
      if(wrapper.tagName.toLowerCase() === 'figure') {
        wrapper.style.position = 'relative';
        wrapper.appendChild(button);
      } else {
        block.style.position = 'relative';
        block.appendChild(button);
      }

      button.addEventListener('click', function() {
        var code = block.querySelector('code');
        var text = code ? code.innerText : block.innerText;
        
        navigator.clipboard.writeText(text).then(function() {
          button.innerText = 'Copied!';
          setTimeout(function() {
            button.innerText = 'Copy';
          }, 2000);
        }).catch(function(err) {
          console.error('Failed to copy text: ', err);
          button.innerText = 'Failed';
        });
      });
    });
  });
</script>
